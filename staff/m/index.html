<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0A0E1A">
  <meta name="robots" content="noindex, nofollow">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="../icons/icon-192.png">
  <link rel="manifest" href="manifest.json">
  <title>FINEXSA Staff</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="m.css">

  <style>
    /* ═══ فرض الأرقام اللاتينية في كل التطبيق ═══ */
    *, *::before, *::after {
      -moz-font-feature-settings: "lnum";
      -webkit-font-feature-settings: "lnum";
      font-feature-settings: "lnum";
      font-variant-numeric: lining-nums tabular-nums;
    }
    body, input, select, textarea, button {
      font-feature-settings: "lnum";
    }

    /* Hero الترحيب */
    .hero {
      background: linear-gradient(135deg, var(--bg-card), var(--bg-deep));
      border: 1px solid var(--border-strong);
      border-radius: 18px;
      padding: 22px;
      margin-bottom: 18px;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: "";
      position: absolute;
      top: 0; right: 0;
      width: 140px; height: 140px;
      background: radial-gradient(circle, var(--gold-muted), transparent 70%);
      pointer-events: none;
    }
    .hero-greeting {
      font-size: 11.5px;
      color: var(--gold);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .hero-name {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 4px;
    }
    .hero-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 8px;
    }
    .hero-tag {
      padding: 3px 10px;
      background: var(--gold-muted);
      color: var(--gold-bright);
      border: 1px solid var(--border-strong);
      border-radius: 100px;
      font-weight: 700;
      font-size: 11px;
    }

    /* Stats */
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 18px;
    }
    .stat {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
    }
    .stat-icon {
      width: 32px; height: 32px;
      background: var(--gold-muted);
      border-radius: 8px;
      display: grid; place-items: center;
      color: var(--gold);
      margin-bottom: 8px;
    }
    .stat-icon svg {
      width: 16px; height: 16px;
      stroke-width: 1.8;
      stroke: currentColor; fill: none;
      stroke-linecap: round; stroke-linejoin: round;
    }
    .stat-label {
      font-size: 10.5px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 700;
      margin-bottom: 2px;
    }
    .stat-value {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    /* Quick actions */
    .section-title {
      font-size: 14px;
      font-weight: 800;
      color: var(--text-primary);
      margin: 22px 0 10px;
      padding-right: 4px;
    }

    .actions-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .action {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 14px;
      text-align: center;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .action:active {
      transform: scale(0.96);
      background: var(--bg-card-hover);
      border-color: var(--gold);
    }
    .action-icon {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, var(--navy), var(--navy-light));
      border: 1px solid var(--border-strong);
      border-radius: 14px;
      display: grid; place-items: center;
      color: var(--gold);
    }
    .action-icon svg {
      width: 22px; height: 22px;
      stroke-width: 1.8;
      stroke: currentColor; fill: none;
      stroke-linecap: round; stroke-linejoin: round;
    }
    .action-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-primary);
    }
    .action-desc {
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.4;
    }

    /* Sign out button */
    .signout-row {
      margin-top: 24px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
      text-align: center;
    }
    .signout-btn {
      background: transparent;
      border: 1px solid rgba(255, 107, 107, 0.3);
      color: var(--error);
      padding: 8px 16px;
      border-radius: 100px;
      font-size: 12.5px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
    .signout-btn:active { background: rgba(255, 107, 107, 0.08); }
  </style>
</head>
<body>

  <div class="app-loader" id="appLoader"><div class="spinner"></div></div>

  <header class="app-header">
    <div class="header-left">
      <div style="font-size:14px; font-weight:800; color:var(--gold); letter-spacing:0.15em;">FINEXSA</div>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="signoutBtnHeader" aria-label="خروج">
        <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </header>

  <main class="app-content">

    <!-- Hero -->
    <section class="hero">
      <div class="hero-greeting" id="greeting">مرحباً</div>
      <div class="hero-name" id="userName">…</div>
      <div class="hero-meta">
        <span class="hero-tag" id="userRole">…</span>
        <span id="userBranch" class="text-muted"></span>
      </div>
    </section>

    <!-- Stats -->
    <section class="stats">
      <div class="stat">
        <div class="stat-icon">
          <svg viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="14" rx="2"/><path d="M3 10h18"/></svg>
        </div>
        <div class="stat-label">الصناديق</div>
        <div class="stat-value" id="statBoxes">—</div>
      </div>
      <div class="stat">
        <div class="stat-icon">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </div>
        <div class="stat-label">آخر دخول</div>
        <div class="stat-value" id="statLastLogin" style="font-size: 14px;">الآن</div>
      </div>
    </section>

    <!-- Quick actions -->
    <h2 class="section-title">الإجراءات السريعة</h2>
    <div class="actions-grid">

      <a href="cash.html" class="action">
        <div class="action-icon">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </div>
        <div class="action-title">حركة جديدة</div>
        <div class="action-desc">قبض أو دفع</div>
      </a>

      <a href="report.html" class="action">
        <div class="action-icon">
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        </div>
        <div class="action-title">كشف الحساب</div>
        <div class="action-desc">حركات الصناديق</div>
      </a>

      <a href="receipt.html" class="action">
        <div class="action-icon">
          <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </div>
        <div class="action-title">إيصال</div>
        <div class="action-desc">طباعة ومشاركة</div>
      </a>

      <a href="../dashboard.html" class="action">
        <div class="action-icon">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        </div>
        <div class="action-title">النسخة الكاملة</div>
        <div class="action-desc">المهام والشركات</div>
      </a>

    </div>

    <div class="signout-row">
      <button class="signout-btn" id="signoutBtn">تسجيل الخروج</button>
    </div>

  </main>

  <!-- Bottom Tabbar -->
  <nav class="tabbar tabbar-3">
    <a href="index.html" class="tab is-active">
      <svg viewBox="0 0 24 24"><path d="M3 12l9-9 9 9"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/></svg>
      <span>الرئيسية</span>
    </a>
    <a href="cash.html" class="tab">
      <svg viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="14" rx="2"/><path d="M3 10h18"/><circle cx="12" cy="15" r="2"/></svg>
      <span>حركة</span>
    </a>
    <a href="report.html" class="tab">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span>كشف</span>
    </a>
  </nav>

  <div class="toast-container" id="toastContainer"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut }
      from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDynBPUjrpBHmPc6EGwHyOZmkEiv-pNhR0",
      authDomain: "finexsa-capital.firebaseapp.com",
      projectId: "finexsa-capital",
      storageBucket: "finexsa-capital.firebasestorage.app",
      messagingSenderId: "225933147484",
      appId: "1:225933147484:web:b71f87f0705553062ed599",
      measurementId: "G-8V2H675WN1"
    };

    const STAFF_API_URL = 'https://script.google.com/macros/s/AKfycbyNz55961uxn0OTfj55vrpxvX6HCMybXOxpkotlLBOr5rmUieyTR_g4cCAvOSc_oUvN/exec';

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // ═════ قراءة بيانات الجلسة ═════
    function getStorage() {
      // إذا كانت البيانات في localStorage (تذكّرني)، استخدمها، وإلا sessionStorage
      if (localStorage.getItem('finexsa_m_uid')) return localStorage;
      if (sessionStorage.getItem('finexsa_m_uid')) return sessionStorage;
      return null;
    }

    const storage = getStorage();
    if (!storage) window.location.replace('login.html');

    function safeParseArray(raw) {
      try { const p = JSON.parse(raw || '[]'); return Array.isArray(p) ? p : []; }
      catch { return []; }
    }

    const me = {
      uid: storage.getItem('finexsa_m_uid'),
      email: storage.getItem('finexsa_m_email') || '',
      name: storage.getItem('finexsa_m_name') || 'موظف',
      role: storage.getItem('finexsa_m_role') || 'accountant',
      branch: storage.getItem('finexsa_m_branch') || '',
      allowedBoxes: safeParseArray(storage.getItem('finexsa_m_allowed'))
    };

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        localStorage.clear();
        sessionStorage.clear();
        window.location.replace('login.html');
      }
    });

    // ═════ تعبئة الواجهة ═════
    const translateRole = r => ({admin:'مدير النظام', accountant:'محاسب', manager:'مدير قسم', viewer:'مشاهد'}[r] || r);

    document.getElementById('userName').textContent = me.name;
    document.getElementById('userRole').textContent = translateRole(me.role);
    if (me.branch) {
      document.getElementById('userBranch').textContent = '📍 ' + me.branch;
    }

    // تحية حسب الوقت
    const hour = new Date().getHours();
    let greeting = 'مرحباً';
    if (hour >= 5 && hour < 12) greeting = 'صباح الخير';
    else if (hour >= 12 && hour < 17) greeting = 'مساء الخير';
    else if (hour >= 17 && hour < 22) greeting = 'مساء الخير';
    else greeting = 'ليلة سعيدة';
    document.getElementById('greeting').textContent = greeting;

    // الإحصائيات
    const isAllBoxes = me.role === 'admin' || me.allowedBoxes.includes('all');
    document.getElementById('statBoxes').textContent = isAllBoxes ? '∞' : me.allowedBoxes.length;

    // ═════ Sign out ═════
    async function handleSignout() {
      try { await signOut(auth); } catch {}
      localStorage.clear();
      sessionStorage.clear();
      window.location.replace('login.html');
    }
    document.getElementById('signoutBtn').addEventListener('click', handleSignout);
    document.getElementById('signoutBtnHeader').addEventListener('click', handleSignout);

    // ═════ إخفاء Loader ═════
    setTimeout(() => {
      document.getElementById('appLoader').classList.add('is-hidden');
      setTimeout(() => document.getElementById('appLoader').remove(), 400);
    }, 250);
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
