<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0A0E1A">
  <meta name="robots" content="noindex, nofollow">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="../icons/icon-192.png">
  <link rel="manifest" href="manifest.json">
  <title>FINEXSA Staff</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="m.css">

  <style>
    *, *::before, *::after { font-feature-settings: "lnum"; font-variant-numeric: lining-nums; }

    /* Hero الترحيب */
    .hero {
      background: linear-gradient(135deg, var(--bg-card), var(--bg-deep));
      border: 1px solid var(--border-strong);
      border-radius: 18px;
      padding: 22px;
      margin-bottom: 18px;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: "";
      position: absolute;
      top: 0; right: 0;
      width: 140px; height: 140px;
      background: radial-gradient(circle, var(--gold-muted), transparent 70%);
      pointer-events: none;
    }
    .hero-content {
      display: flex;
      align-items: center;
      gap: 14px;
      position: relative;
      z-index: 2;
    }
    .hero-avatar {
      width: 54px; height: 54px;
      background: linear-gradient(135deg, var(--gold), var(--gold-bright));
      border-radius: 50%;
      display: grid; place-items: center;
      color: var(--bg-void);
      font-weight: 900;
      font-size: 17px;
      flex-shrink: 0;
      box-shadow: 0 8px 20px -6px rgba(201, 162, 39, 0.5);
    }
    .hero-text { flex: 1; min-width: 0; }
    .hero-greeting {
      font-size: 11.5px;
      color: var(--gold);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .hero-name {
      font-size: 19px;
      font-weight: 800;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .hero-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      font-size: 11.5px;
      color: var(--text-muted);
    }
    .hero-tag {
      padding: 2px 9px;
      background: var(--gold-muted);
      color: var(--gold-bright);
      border: 1px solid var(--border-strong);
      border-radius: 100px;
      font-weight: 700;
      font-size: 10.5px;
    }

    /* Stats */
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 18px;
    }
    .stat {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
    }
    .stat-icon {
      width: 32px; height: 32px;
      background: var(--gold-muted);
      border-radius: 8px;
      display: grid; place-items: center;
      color: var(--gold);
      margin-bottom: 8px;
    }
    .stat-icon svg {
      width: 16px; height: 16px;
      stroke-width: 1.8;
      stroke: currentColor; fill: none;
      stroke-linecap: round; stroke-linejoin: round;
    }
    .stat-label {
      font-size: 10.5px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 700;
      margin-bottom: 2px;
    }
    .stat-value {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.02em;
      direction: ltr;
      text-align: right;
    }
    .stat-meta {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    .section-title {
      font-size: 14px;
      font-weight: 800;
      color: var(--text-primary);
      margin: 22px 0 10px;
      padding-right: 4px;
    }

    .actions-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .action {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 14px;
      text-align: center;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .action:active {
      transform: scale(0.96);
      background: var(--bg-card-hover);
      border-color: var(--gold);
    }
    .action-icon {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, var(--navy), var(--navy-light));
      border: 1px solid var(--border-strong);
      border-radius: 14px;
      display: grid; place-items: center;
      color: var(--gold);
    }
    .action-icon svg {
      width: 22px; height: 22px;
      stroke-width: 1.8;
      stroke: currentColor; fill: none;
      stroke-linecap: round; stroke-linejoin: round;
    }
    .action-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-primary);
    }
    .action-desc {
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.4;
    }

    .signout-row {
      margin-top: 24px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
      text-align: center;
    }
    .signout-btn {
      background: transparent;
      border: 1px solid rgba(255, 107, 107, 0.3);
      color: var(--error);
      padding: 8px 20px;
      border-radius: 100px;
      font-size: 12.5px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
    .signout-btn:active { background: rgba(255, 107, 107, 0.08); }
  </style>
</head>
<body>

  <div class="app-loader" id="appLoader"><div class="spinner"></div></div>

  <header class="app-header">
    <div class="header-left">
      <div style="font-size:14px; font-weight:800; color:var(--gold); letter-spacing:0.15em;">FINEXSA</div>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="signoutBtnHeader" aria-label="خروج">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </header>

  <main class="app-content">

    <!-- Hero -->
    <section class="hero">
      <div class="hero-content">
        <div class="hero-avatar" id="heroAvatar">··</div>
        <div class="hero-text">
          <div class="hero-greeting" id="greeting">مرحباً</div>
          <div class="hero-name" id="userName">…</div>
          <div class="hero-meta">
            <span class="hero-tag" id="userRole">…</span>
            <span id="userBranch" class="text-muted"></span>
          </div>
        </div>
      </div>
    </section>

    <!-- Stats -->
    <section class="stats">
      <div class="stat">
        <div class="stat-icon">
          <svg viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="14" rx="2"/><path d="M3 10h18"/></svg>
        </div>
        <div class="stat-label">الصناديق</div>
        <div class="stat-value" id="statBoxes">—</div>
        <div class="stat-meta" id="statBoxesMeta">صندوق مسموح</div>
      </div>
      <div class="stat">
        <div class="stat-icon">
          <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        </div>
        <div class="stat-label">المهام النشطة</div>
        <div class="stat-value" id="statTasks">—</div>
        <div class="stat-meta">للتنفيذ</div>
      </div>
    </section>

    <!-- Quick actions -->
    <h2 class="section-title">الإجراءات السريعة</h2>
    <div class="actions-grid">
      <a href="cash.html" class="action">
        <div class="action-icon">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </div>
        <div class="action-title">حركة جديدة</div>
        <div class="action-desc">قبض أو دفع</div>
      </a>

      <a href="report.html" class="action">
        <div class="action-icon">
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        </div>
        <div class="action-title">كشف الحساب</div>
        <div class="action-desc">حركات الصناديق</div>
      </a>

      <a href="tasks.html" class="action">
        <div class="action-icon">
          <svg viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        </div>
        <div class="action-title">المهام</div>
        <div class="action-desc" id="tasksActionDesc">قائمة مهامي</div>
      </a>

      <a href="report.html" class="action">
        <div class="action-icon">
          <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </div>
        <div class="action-title">إيصال</div>
        <div class="action-desc">طباعة ومشاركة</div>
      </a>
    </div>

    <div class="signout-row">
      <button class="signout-btn" id="signoutBtn">تسجيل الخروج</button>
    </div>

  </main>

  <nav class="tabbar">
    <a href="index.html" class="tab is-active">
      <svg viewBox="0 0 24 24"><path d="M3 12l9-9 9 9"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/></svg>
      <span>الرئيسية</span>
    </a>
    <a href="cash.html" class="tab">
      <svg viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="14" rx="2"/><path d="M3 10h18"/><circle cx="12" cy="15" r="2"/></svg>
      <span>حركة</span>
    </a>
    <a href="report.html" class="tab">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span>كشف</span>
    </a>
    <a href="tasks.html" class="tab">
      <svg viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      <span>المهام</span>
    </a>
  </nav>

  <div class="toast-container" id="toastContainer"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut }
      from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDynBPUjrpBHmPc6EGwHyOZmkEiv-pNhR0",
      authDomain: "finexsa-capital.firebaseapp.com",
      projectId: "finexsa-capital",
      storageBucket: "finexsa-capital.firebasestorage.app",
      messagingSenderId: "225933147484",
      appId: "1:225933147484:web:b71f87f0705553062ed599",
      measurementId: "G-8V2H675WN1"
    };

    const STAFF_API_URL = 'https://script.google.com/macros/s/AKfycbyNz55961uxn0OTfj55vrpxvX6HCMybXOxpkotlLBOr5rmUieyTR_g4cCAvOSc_oUvN/exec';

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    function getStorage() {
      if (localStorage.getItem('finexsa_m_uid')) return localStorage;
      if (sessionStorage.getItem('finexsa_m_uid')) return sessionStorage;
      return null;
    }

    const storage = getStorage();
    if (!storage) window.location.replace('login.html');

    function safeParseArray(raw) {
      try { const p = JSON.parse(raw || '[]'); return Array.isArray(p) ? p : []; }
      catch { return []; }
    }

    // قراءة الجلسة (للتعبئة الأولية الفورية)
    let me = {
      uid: storage.getItem('finexsa_m_uid'),
      email: storage.getItem('finexsa_m_email') || '',
      name: storage.getItem('finexsa_m_name') || 'موظف',
      role: storage.getItem('finexsa_m_role') || 'accountant',
      branch: storage.getItem('finexsa_m_branch') || '',
      allowedBoxes: safeParseArray(storage.getItem('finexsa_m_allowed'))
    };

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        localStorage.clear(); sessionStorage.clear();
        window.location.replace('login.html');
      }
    });

    // ═════ Helpers ═════
    function getInitials(name) {
      if (!name) return 'FX';
      const parts = String(name).trim().split(/\s+/);
      if (parts.length === 1) return parts[0].substring(0, 2).toUpperCase();
      return (parts[0][0] + parts[1][0]).toUpperCase();
    }

    function translateRole(role) {
      const map = {
        'admin': 'مدير النظام',
        'accountant': 'محاسب',
        'manager': 'مدير قسم',
        'viewer': 'مشاهد'
      };
      return map[role] || role;
    }

    function getGreeting() {
      const hour = new Date().getHours();
      if (hour >= 5 && hour < 12) return 'صباح الخير';
      if (hour >= 12 && hour < 17) return 'مساء الخير';
      if (hour >= 17 && hour < 22) return 'مساء الخير';
      return 'ليلة سعيدة';
    }

    // ═════ تعبئة الواجهة ═════
    function renderProfile() {
      document.getElementById('heroAvatar').textContent = getInitials(me.name);
      document.getElementById('userName').textContent = me.name;
      document.getElementById('userRole').textContent = translateRole(me.role);
      document.getElementById('greeting').textContent = getGreeting();
      if (me.branch) {
        document.getElementById('userBranch').textContent = '📍 ' + me.branch;
      } else {
        document.getElementById('userBranch').textContent = '';
      }

      // إحصائية الصناديق
      const isAllBoxes = me.role === 'admin' || me.allowedBoxes.includes('all');
      const statBoxes = document.getElementById('statBoxes');
      const statBoxesMeta = document.getElementById('statBoxesMeta');
      if (isAllBoxes) {
        statBoxes.textContent = '∞';
        statBoxesMeta.textContent = 'وصول كامل';
      } else {
        statBoxes.textContent = me.allowedBoxes.length;
        statBoxesMeta.textContent = me.allowedBoxes.length === 1 ? 'صندوق' : 'صندوق مسموح';
      }

      // تحديث وصف زر المهام
      if (me.role === 'admin') {
        document.getElementById('tasksActionDesc').textContent = 'إدارة المهام';
      }
    }

    renderProfile();

    // ═════ تحديث البيانات عبر getMe (نفس API سطح المكتب) ═════
    async function refreshMe() {
      try {
        const user = auth.currentUser;
        if (!user) return;
        const token = await user.getIdToken();
        const res = await fetch(`${STAFF_API_URL}?action=getMe&token=${encodeURIComponent(token)}`);
        const data = await res.json();
        if (!data.ok) {
          if (data.code === 'USER_INACTIVE' || data.code === 'USER_NOT_FOUND') {
            localStorage.clear(); sessionStorage.clear();
            await signOut(auth);
            window.location.replace('login.html');
          }
          return;
        }

        // تحديث القيم في الواجهة و localStorage
        const u = data.user;
        me = {
          uid: u.uid,
          email: u.email,
          name: u.displayName || me.name,
          role: u.role,
          branch: u.branch || '',
          allowedBoxes: u.allowedBoxes || []
        };

        // حفظ في الـ storage الذي كان مستخدماً
        storage.setItem('finexsa_m_uid', me.uid);
        storage.setItem('finexsa_m_email', me.email);
        storage.setItem('finexsa_m_name', me.name);
        storage.setItem('finexsa_m_role', me.role);
        storage.setItem('finexsa_m_branch', me.branch);
        storage.setItem('finexsa_m_allowed', JSON.stringify(me.allowedBoxes));

        renderProfile();
      } catch (err) {
        // فشل صامت — البيانات من الجلسة كافية
        console.warn('Failed to refresh me:', err);
      }
    }

    // ═════ تحميل عدد المهام (نفس منطق سطح المكتب) ═════
    async function loadTasksCount() {
      try {
        const user = auth.currentUser;
        if (!user) return;
        const token = await user.getIdToken();
        const res = await fetch(`${STAFF_API_URL}?action=getTasks&token=${encodeURIComponent(token)}&status=todo`);
        const data = await res.json();
        if (data.ok) {
          const count = (data.tasks || []).length;
          document.getElementById('statTasks').textContent = count;
        } else {
          document.getElementById('statTasks').textContent = '0';
        }
      } catch {
        document.getElementById('statTasks').textContent = '0';
      }
    }

    // ═════ Sign out ═════
    async function handleSignout() {
      try { await signOut(auth); } catch {}
      localStorage.clear();
      sessionStorage.clear();
      window.location.replace('login.html');
    }
    document.getElementById('signoutBtn').addEventListener('click', handleSignout);
    document.getElementById('signoutBtnHeader').addEventListener('click', handleSignout);

    // ═════ تحميل البيانات بعد التحقق ═════
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        await Promise.all([refreshMe(), loadTasksCount()]);
      }
    });

    // ═════ إخفاء Loader ═════
    setTimeout(() => {
      document.getElementById('appLoader').classList.add('is-hidden');
      setTimeout(() => document.getElementById('appLoader').remove(), 400);
    }, 300);
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
