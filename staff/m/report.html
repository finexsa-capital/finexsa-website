<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0A0E1A">
  <meta name="robots" content="noindex, nofollow">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="../icons/icon-192.png">
  <link rel="manifest" href="manifest.json">
  <title>كشف الحساب — FINEXSA</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="m.css">

  <style>
    *, *::before, *::after { font-feature-settings: "lnum"; font-variant-numeric: lining-nums; }

    .filter-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 14px;
    }

    /* شارة فترة الكشف */
    .period-badge {
      background: var(--bg-deep);
      border: 1px dashed var(--border-strong);
      border-radius: 12px;
      padding: 10px 14px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .period-badge svg {
      width: 16px; height: 16px;
      stroke-width: 2;
      stroke: var(--gold); fill: none;
      stroke-linecap: round; stroke-linejoin: round;
      flex-shrink: 0;
    }
    .period-badge strong {
      color: var(--gold-bright);
      font-weight: 700;
      direction: ltr;
      display: inline-block;
    }

    /* ═══ Stats summary ═══ */
    .summary {
      background: linear-gradient(135deg, var(--bg-card), var(--bg-deep));
      border: 1px solid var(--border-strong);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .summary-balance {
      text-align: center;
      padding-bottom: 14px;
      border-bottom: 1px dashed var(--border);
      margin-bottom: 14px;
    }
    .summary-label {
      font-size: 11px;
      color: var(--gold);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .summary-value {
      font-size: 28px;
      font-weight: 900;
      direction: ltr;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
    }
    .summary-value.positive { color: var(--success); }
    .summary-value.negative { color: var(--error); }
    .summary-currency {
      font-size: 13px;
      color: var(--text-muted);
      margin-right: 6px;
      font-weight: 700;
    }
    .summary-flow {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .flow-item { text-align: center; }
    .flow-icon {
      width: 28px; height: 28px;
      margin: 0 auto 6px;
      border-radius: 50%;
      display: grid; place-items: center;
    }
    .flow-icon.receive { background: rgba(74, 222, 128, 0.15); color: var(--success); }
    .flow-icon.pay { background: rgba(255, 107, 107, 0.15); color: var(--error); }
    .flow-icon svg { width: 14px; height: 14px; stroke-width: 2.5; stroke: currentColor; fill: none; }
    .flow-label {
      font-size: 11px; color: var(--text-dim);
      font-weight: 700; letter-spacing: 0.05em;
    }
    .flow-amount {
      font-size: 13px; font-weight: 800;
      direction: ltr; margin-top: 2px;
    }
    .flow-amount.receive { color: var(--success); }
    .flow-amount.pay { color: var(--error); }

    /* فلاتر */
    .filters-pills {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding: 2px 0;
      margin-bottom: 14px;
      scrollbar-width: none;
    }
    .filters-pills::-webkit-scrollbar { display: none; }
    .filter-pill {
      flex-shrink: 0;
      padding: 6px 14px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 100px;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
    }
    .filter-pill.is-active {
      background: var(--gold-muted);
      border-color: var(--gold);
      color: var(--gold-bright);
    }

    .search-row { margin-bottom: 12px; }

    /* بطاقات الحركات */
    .txn-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 10px;
      animation: slideIn 0.25s ease;
    }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

    .txn-head {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }
    .txn-dir {
      width: 38px; height: 38px;
      border-radius: 50%;
      display: grid; place-items: center;
      flex-shrink: 0;
    }
    .txn-dir.receive { background: rgba(74, 222, 128, 0.15); color: var(--success); }
    .txn-dir.pay { background: rgba(255, 107, 107, 0.15); color: var(--error); }
    .txn-dir svg { width: 18px; height: 18px; stroke-width: 2.4; stroke: currentColor; fill: none; }

    .txn-info { flex: 1; min-width: 0; }
    .txn-amount {
      font-size: 17px; font-weight: 800;
      direction: ltr; text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .txn-amount.receive { color: var(--success); }
    .txn-amount.pay { color: var(--error); }
    .txn-amount-currency {
      font-size: 11px; color: var(--text-muted);
      margin-right: 4px; font-weight: 700;
    }
    .txn-opposite {
      font-size: 13px; color: var(--text-primary);
      margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .txn-meta {
      font-size: 11px; color: var(--text-dim);
      display: flex; gap: 10px;
      margin-bottom: 10px; padding-bottom: 10px;
      border-bottom: 1px dashed var(--border);
    }
    .txn-meta-item { display: inline-flex; align-items: center; gap: 4px; }
    .txn-meta-item svg { width: 11px; height: 11px; stroke-width: 2; stroke: currentColor; fill: none; }
    .txn-note {
      font-size: 12px; color: var(--text-muted);
      line-height: 1.5; margin-bottom: 10px;
      padding-bottom: 10px; border-bottom: 1px dashed var(--border);
    }
    .txn-balance {
      display: flex; justify-content: space-between;
      align-items: center; font-size: 11.5px;
      margin-bottom: 10px;
    }
    .txn-balance-label { color: var(--text-dim); font-weight: 700; }
    .txn-balance-value {
      font-weight: 800; direction: ltr;
      font-variant-numeric: tabular-nums;
    }
    .txn-actions {
      display: flex; gap: 8px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }
    .txn-action-btn {
      flex: 1;
      padding: 10px 8px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: all 0.15s ease;
    }
    .txn-action-btn:active { transform: scale(0.96); }
    .txn-action-btn.receipt {
      background: var(--gold-muted);
      border-color: var(--border-strong);
      color: var(--gold-bright);
    }
    .txn-action-btn.share {
      background: rgba(37, 211, 102, 0.12);
      border-color: rgba(37, 211, 102, 0.3);
      color: var(--whatsapp);
    }
    .txn-action-btn svg { width: 13px; height: 13px; stroke-width: 2; stroke: currentColor; fill: none; }

    .skeleton {
      background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-card-hover) 50%, var(--bg-card) 75%);
      background-size: 200% 100%;
      animation: skeleton 1.4s ease-in-out infinite;
      border-radius: 8px;
    }
    @keyframes skeleton {
      from { background-position: 200% 0; }
      to { background-position: -200% 0; }
    }
    .skeleton-card { height: 140px; margin-bottom: 10px; }

    /* عدّاد الحركات */
    .txn-count {
      text-align: center;
      font-size: 11.5px;
      color: var(--text-dim);
      margin-bottom: 12px;
      font-weight: 700;
    }
  </style>
</head>
<body>

  <div class="app-loader" id="appLoader"><div class="spinner"></div></div>

  <header class="app-header">
    <div class="header-left">
      <button class="icon-btn" onclick="window.location.href='index.html'" aria-label="رجوع">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <h1 class="app-title">كشف الحساب</h1>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="refreshBtn" aria-label="تحديث">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
      </button>
    </div>
  </header>

  <main class="app-content">

    <div class="filter-card">
      <div class="field-group" style="margin-bottom:12px;">
        <label class="field-label" for="boxSelect">
          <span class="required">*</span> الصندوق
        </label>
        <select id="boxSelect" class="field-select">
          <option value="">— اختر الصندوق —</option>
        </select>
      </div>

      <button class="btn btn-primary" id="btnLoad">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        عرض الحركات
      </button>
    </div>

    <!-- شارة الفترة (تظهر بعد التحميل) -->
    <div class="period-badge" id="periodBadge" style="display:none">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>الفترة: <strong id="periodFrom">—</strong> ← <strong id="periodTo">—</strong></span>
    </div>

    <!-- البحث -->
    <div class="search-row" id="searchRow" style="display:none">
      <input type="text" id="filterSearch" class="field-input" placeholder="بحث في البيان والحساب…">
    </div>

    <!-- فلتر الاتجاه -->
    <div class="filters-pills" id="dirFilters" style="display:none">
      <button class="filter-pill is-active" data-dir="">الكل</button>
      <button class="filter-pill" data-dir="rec">قبض فقط</button>
      <button class="filter-pill" data-dir="pay">دفع فقط</button>
    </div>

    <!-- ملخص الرصيد -->
    <div class="summary" id="summary" style="display:none">
      <div class="summary-balance">
        <div class="summary-label">الرصيد الحالي</div>
        <div class="summary-value" id="balanceValue">
          <span id="balanceNumber">0</span>
          <span class="summary-currency" id="balanceCurrency"></span>
        </div>
      </div>
      <div class="summary-flow">
        <div class="flow-item">
          <div class="flow-icon receive">
            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polyline points="19 12 12 19 5 12"/><line x1="12" y1="5" x2="12" y2="19"/></svg>
          </div>
          <div class="flow-label">إجمالي القبض</div>
          <div class="flow-amount receive" id="totalReceive">0</div>
        </div>
        <div class="flow-item">
          <div class="flow-icon pay">
            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polyline points="5 12 12 5 19 12"/><line x1="12" y1="19" x2="12" y2="5"/></svg>
          </div>
          <div class="flow-label">إجمالي الدفع</div>
          <div class="flow-amount pay" id="totalPay">0</div>
        </div>
      </div>
    </div>

    <div class="txn-count" id="txnCount" style="display:none"></div>

    <div id="txnList"></div>

  </main>

  <nav class="tabbar">
    <a href="index.html" class="tab">
      <svg viewBox="0 0 24 24"><path d="M3 12l9-9 9 9"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/></svg>
      <span>الرئيسية</span>
    </a>
    <a href="cash.html" class="tab">
      <svg viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="14" rx="2"/><path d="M3 10h18"/><circle cx="12" cy="15" r="2"/></svg>
      <span>حركة</span>
    </a>
    <a href="report.html" class="tab is-active">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span>كشف</span>
    </a>
    <a href="tasks.html" class="tab">
      <svg viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      <span>المهام</span>
    </a>
  </nav>

  <div class="toast-container" id="toastContainer"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDynBPUjrpBHmPc6EGwHyOZmkEiv-pNhR0",
      authDomain: "finexsa-capital.firebaseapp.com",
      projectId: "finexsa-capital",
      storageBucket: "finexsa-capital.firebasestorage.app",
      messagingSenderId: "225933147484",
      appId: "1:225933147484:web:b71f87f0705553062ed599",
      measurementId: "G-8V2H675WN1"
    };

    const STAFF_API_URL = 'https://script.google.com/macros/s/AKfycbyNz55961uxn0OTfj55vrpxvX6HCMybXOxpkotlLBOr5rmUieyTR_g4cCAvOSc_oUvN/exec';

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    function getStorage() {
      if (localStorage.getItem('finexsa_m_uid')) return localStorage;
      if (sessionStorage.getItem('finexsa_m_uid')) return sessionStorage;
      return null;
    }
    const storage = getStorage();
    if (!storage) window.location.replace('login.html');

    function safeParseArray(raw) {
      try { const p = JSON.parse(raw || '[]'); return Array.isArray(p) ? p : []; }
      catch { return []; }
    }

    const me = {
      uid: storage.getItem('finexsa_m_uid'),
      name: storage.getItem('finexsa_m_name') || 'موظف',
      role: storage.getItem('finexsa_m_role') || 'accountant',
      allowedBoxes: safeParseArray(storage.getItem('finexsa_m_allowed'))
    };

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        localStorage.clear(); sessionStorage.clear();
        window.location.replace('login.html');
      }
    });

    function toast(msg, type = 'info', duration = 2500) {
      const el = document.createElement('div');
      el.className = `toast ${type}`;
      const icons = {
        success: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
        error: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
        info: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/></svg>'
      };
      el.innerHTML = `<div class="toast-icon">${icons[type]||icons.info}</div><span>${msg}</span>`;
      document.getElementById('toastContainer').appendChild(el);
      setTimeout(() => {
        el.classList.add('is-leaving');
        setTimeout(() => el.remove(), 200);
      }, duration);
    }

    // ═══ State ═══
    const state = {
      boxes: [],
      currentBox: '',
      currentCurrency: '',
      rawData: [],
      filtered: [],
      directionFilter: '',
      summary: null
    };

    // ═══ تحميل قائمة الصناديق ═══
    async function loadBoxes() {
      try {
        const user = auth.currentUser;
        if (!user) return;
        const token = await user.getIdToken();

        // استخدام getLists نفس سطح المكتب
        const res = await fetch(`${STAFF_API_URL}?action=getLists&token=${encodeURIComponent(token)}`);
        const data = await res.json();
        if (!data.ok) throw new Error(data.message);

        const allBoxes = (data.lists && data.lists['الصناديق']) || [];
        const isAll = me.role === 'admin' || me.allowedBoxes.includes('all');
        state.boxes = isAll ? allBoxes : allBoxes.filter(b => me.allowedBoxes.includes(b));

        const select = document.getElementById('boxSelect');
        select.innerHTML = '<option value="">— اختر الصندوق —</option>';
        state.boxes.forEach(b => {
          const opt = document.createElement('option');
          opt.value = b; opt.textContent = b;
          select.appendChild(opt);
        });

        document.getElementById('appLoader').classList.add('is-hidden');
        setTimeout(() => document.getElementById('appLoader').remove(), 400);
      } catch (err) {
        toast('فشل تحميل الصناديق: ' + err.message, 'error');
        document.getElementById('appLoader').classList.add('is-hidden');
      }
    }

    onAuthStateChanged(auth, (user) => { if (user) loadBoxes(); });

    // ═══ تحميل الكشف — نفس API سطح المكتب ═══
    document.getElementById('btnLoad').addEventListener('click', loadReport);
    document.getElementById('refreshBtn').addEventListener('click', loadReport);

    async function loadReport() {
      const box = document.getElementById('boxSelect').value;
      if (!box) { toast('اختر الصندوق أولاً', 'error'); return; }

      const list = document.getElementById('txnList');
      list.innerHTML = `
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
      `;
      // إخفاء كل العناصر الإضافية أثناء التحميل
      document.getElementById('summary').style.display = 'none';
      document.getElementById('dirFilters').style.display = 'none';
      document.getElementById('searchRow').style.display = 'none';
      document.getElementById('periodBadge').style.display = 'none';
      document.getElementById('txnCount').style.display = 'none';

      try {
        const user = auth.currentUser;
        const token = await user.getIdToken();

        // ✅ نفس URL سطح المكتب — بدون from/to
        const url = `${STAFF_API_URL}?action=getReport&token=${encodeURIComponent(token)}&box=${encodeURIComponent(box)}`;
        const res = await fetch(url);
        const data = await res.json();

        if (!data.ok) throw new Error(data.message || 'فشل التحميل');

        // ✅ نفس بنية البيانات: data.data و data.currency و data.boxName
        state.currentBox = data.boxName || box;
        state.currentCurrency = data.currency || '';
        state.rawData = data.data || [];
        state.summary = data.summary || null;

        // اكتشاف الفترة تلقائياً من البيانات
        if (state.rawData.length > 0) {
          const dates = state.rawData.map(r => r.date).filter(Boolean).sort();
          const fromDate = dates[0];
          const toDate = dates[dates.length - 1];
          document.getElementById('periodFrom').textContent = formatDate(fromDate);
          document.getElementById('periodTo').textContent = formatDate(toDate);
          document.getElementById('periodBadge').style.display = 'flex';

          document.getElementById('searchRow').style.display = 'block';
          document.getElementById('dirFilters').style.display = 'flex';
          document.getElementById('summary').style.display = 'block';
          document.getElementById('txnCount').style.display = 'block';
        }

        applyFilters();

      } catch (err) {
        list.innerHTML = '';
        toast('فشل تحميل الكشف: ' + err.message, 'error', 4000);
      }
    }

    // ═══ Filters ═══
    document.getElementById('filterSearch').addEventListener('input', applyFilters);

    document.querySelectorAll('[data-dir]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('[data-dir]').forEach(b => b.classList.remove('is-active'));
        btn.classList.add('is-active');
        state.directionFilter = btn.dataset.dir;
        applyFilters();
      });
    });

    function applyFilters() {
      const search = document.getElementById('filterSearch').value.trim().toLowerCase();
      const dir = state.directionFilter;

      let filtered = state.rawData.filter(r => {
        // ✅ نفس منطق الفلتر في سطح المكتب
        if (dir === 'rec' && (!r.rec || r.rec === '')) return false;
        if (dir === 'pay' && (!r.pay || r.pay === '')) return false;
        if (search) {
          const haystack = `${r.note || ''} ${r.opposite || ''}`.toLowerCase();
          if (!haystack.includes(search)) return false;
        }
        return true;
      });

      state.filtered = filtered;
      renderTransactions();
      updateStats();
      updateCount();
    }

    function updateCount() {
      const c = document.getElementById('txnCount');
      if (state.filtered.length === state.rawData.length) {
        c.textContent = `${state.filtered.length} حركة`;
      } else {
        c.textContent = `${state.filtered.length} من أصل ${state.rawData.length} حركة`;
      }
    }

    function updateStats() {
      let totalRec = 0, totalPay = 0;
      state.rawData.forEach(r => {
        if (typeof r.rec === 'number') totalRec += r.rec;
        else if (r.rec && !isNaN(parseFloat(r.rec))) totalRec += parseFloat(r.rec);
        if (typeof r.pay === 'number') totalPay += r.pay;
        else if (r.pay && !isNaN(parseFloat(r.pay))) totalPay += parseFloat(r.pay);
      });

      // ✅ الرصيد الحالي يأتي من الـ API (آخر قيمة عمود F)
      // البيانات معكوسة من الأحدث للأقدم، لذلك أول صف = آخر حركة = الرصيد الحالي
      const currentBalance = (state.summary && typeof state.summary.currentBalance === 'number')
        ? state.summary.currentBalance
        : (state.rawData.length > 0 && typeof state.rawData[0].balance === 'number'
            ? state.rawData[0].balance
            : 0);

      const balanceEl = document.getElementById('balanceValue');
      balanceEl.classList.remove('positive', 'negative');
      balanceEl.classList.add(currentBalance >= 0 ? 'positive' : 'negative');

      document.getElementById('balanceNumber').textContent = formatNumber(Math.abs(currentBalance));
      document.getElementById('balanceCurrency').textContent = state.currentCurrency || '';
      document.getElementById('totalReceive').textContent = formatNumber(totalRec);
      document.getElementById('totalPay').textContent = formatNumber(totalPay);
    }

    function renderTransactions() {
      const list = document.getElementById('txnList');
      if (state.filtered.length === 0) {
        list.innerHTML = `
          <div class="empty">
            <div class="empty-icon">
              <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            </div>
            <div class="empty-title">${state.rawData.length === 0 ? 'لا توجد حركات في هذا الصندوق' : 'لا نتائج'}</div>
            <div class="empty-msg">${state.rawData.length === 0 ? 'الصندوق فارغ' : 'جرّب تغيير المرشّح أو البحث'}</div>
          </div>
        `;
        return;
      }

      // ✅ البيانات تأتي مرتبة من الأحدث للأقدم، وكل صف يحتوي balance من العمود F
      // لا حاجة لحساب تراكمي محلي
      list.innerHTML = state.filtered.map(r => {
        const recVal = (typeof r.rec === 'number') ? r.rec : (parseFloat(r.rec) || 0);
        const payVal = (typeof r.pay === 'number') ? r.pay : (parseFloat(r.pay) || 0);
        const isReceive = recVal > 0;
        const amount = isReceive ? recVal : payVal;
        const dirClass = isReceive ? 'receive' : 'pay';
        const balanceVal = (typeof r.balance === 'number') ? r.balance : (parseFloat(r.balance) || 0);
        const dirIcon = isReceive
          ? '<svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polyline points="19 12 12 19 5 12"/><line x1="12" y1="5" x2="12" y2="19"/></svg>'
          : '<svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polyline points="5 12 12 5 19 12"/><line x1="12" y1="19" x2="12" y2="5"/></svg>';

        return `
          <div class="txn-card">
            <div class="txn-head">
              <div class="txn-dir ${dirClass}">${dirIcon}</div>
              <div class="txn-info">
                <div class="txn-amount ${dirClass}">
                  ${isReceive ? '+' : '−'}${formatNumber(amount)}
                  <span class="txn-amount-currency">${state.currentCurrency}</span>
                </div>
                <div class="txn-opposite">${escapeHTML(r.opposite || '—')}</div>
              </div>
            </div>
            <div class="txn-meta">
              <span class="txn-meta-item">
                <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                ${formatDate(r.date)}
              </span>
            </div>
            ${r.note ? `<div class="txn-note">${escapeHTML(r.note)}</div>` : ''}
            <div class="txn-balance">
              <span class="txn-balance-label">الرصيد بعد الحركة</span>
              <span class="txn-balance-value" style="color:${balanceVal >= 0 ? 'var(--success)' : 'var(--error)'};">${formatNumber(balanceVal)} ${state.currentCurrency}</span>
            </div>
            <div class="txn-actions">
              <button class="txn-action-btn receipt" data-receipt='${escapeJSON(r)}'>
                <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                إيصال
              </button>
              <button class="txn-action-btn share" data-share='${escapeJSON(r)}'>
                <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                مشاركة
              </button>
            </div>
          </div>
        `;
      }).join('');

      list.querySelectorAll('[data-receipt]').forEach(btn => {
        btn.addEventListener('click', () => {
          const r = JSON.parse(btn.dataset.receipt);
          openReceipt(r, false);
        });
      });
      list.querySelectorAll('[data-share]').forEach(btn => {
        btn.addEventListener('click', () => {
          const r = JSON.parse(btn.dataset.share);
          openReceipt(r, true);
        });
      });
    }

    function openReceipt(txn, autoShare) {
      sessionStorage.setItem('finexsa_m_receipt', JSON.stringify({
        txn,
        box: state.currentBox,
        currency: state.currentCurrency,
        autoShare: !!autoShare
      }));
      window.location.href = 'receipt.html';
    }

    function formatNumber(n, decimals = 2) {
      return new Intl.NumberFormat('en-US', {
        maximumFractionDigits: decimals,
        minimumFractionDigits: 0
      }).format(Number(n) || 0);
    }
    function formatDate(s) {
      if (!s) return '—';
      const parts = String(s).split('-');
      if (parts.length === 3) {
        return `${parts[2]}/${parts[1]}/${parts[0]}`;
      }
      const d = new Date(s);
      if (isNaN(d.getTime())) return s;
      return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
    }
    function escapeHTML(s) {
      return String(s || '').replace(/[&<>"']/g, c =>
        ({'&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'}[c])
      );
    }
    function escapeJSON(o) {
      return JSON.stringify(o).replace(/'/g, '&#39;').replace(/"/g, '&quot;');
    }
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
