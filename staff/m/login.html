<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0A0E1A">
  <meta name="robots" content="noindex, nofollow">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FINEXSA">
  <link rel="apple-touch-icon" href="../icons/icon-192.png">
  <link rel="manifest" href="manifest.json">
  <title>دخول — FINEXSA Staff</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="m.css">

  <style>
    /* ستايل خاص بشاشة الدخول */
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 32px 24px;
      max-width: 420px;
      width: 100%;
      margin: 0 auto;
      position: relative;
      z-index: 2;
      box-shadow: 0 30px 80px -30px rgba(0,0,0,0.5);
    }

    .login-logo {
      width: 76px; height: 76px;
      margin: 0 auto 16px;
      background: linear-gradient(135deg, var(--navy), var(--navy-light));
      border: 1px solid var(--border-strong);
      border-radius: 22px;
      display: grid; place-items: center;
      color: var(--gold);
      box-shadow: 0 12px 30px -10px var(--gold-muted);
    }
    .login-logo svg {
      width: 36px; height: 36px;
      stroke-width: 1.5;
      stroke: currentColor; fill: none;
      stroke-linecap: round; stroke-linejoin: round;
    }

    .login-brand {
      font-size: 13px;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.22em;
      text-align: center;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .login-title {
      font-size: 22px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 6px;
    }

    .login-subtitle {
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 26px;
    }

    .alert {
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 14px;
      display: none;
      border: 1px solid transparent;
    }
    .alert.show { display: block; }
    .alert.error {
      background: rgba(255, 107, 107, 0.1);
      color: var(--error);
      border-color: rgba(255, 107, 107, 0.3);
    }
    .alert.success {
      background: rgba(74, 222, 128, 0.1);
      color: var(--success);
      border-color: rgba(74, 222, 128, 0.3);
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 8px 0 18px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .checkbox-row input[type="checkbox"] {
      width: 18px; height: 18px;
      border: 1.5px solid var(--border-strong);
      border-radius: 5px;
      background: var(--bg-void);
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
      -webkit-appearance: none;
      appearance: none;
    }
    .checkbox-row input[type="checkbox"]:checked {
      background: var(--gold);
      border-color: var(--gold);
    }
    .checkbox-row input[type="checkbox"]:checked::after {
      content: "✓";
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: var(--bg-void);
      font-size: 12px;
      font-weight: 900;
    }

    .login-footer {
      text-align: center;
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
      font-size: 11.5px;
      color: var(--text-dim);
    }

    .spinner-btn {
      width: 18px; height: 18px;
      border: 2px solid rgba(10,14,26,0.3);
      border-top-color: var(--bg-void);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .btn.is-loading .spinner-btn { display: block; }
    .btn.is-loading .btn-text { display: none; }
  </style>
</head>
<body>

  <div class="login-card">

    <div class="login-logo">
      <svg viewBox="0 0 24 24">
        <path d="M12 3v18M5 8h14M3 12l2-4 2 4M3 12c0 1.5 1 3 2 3s2-1.5 2-3M17 12l2-4 2 4M17 12c0 1.5 1 3 2 3s2-1.5 2-3M5 21h14"/>
      </svg>
    </div>

    <div class="login-brand">FINEXSA Capital</div>
    <h1 class="login-title">لوحة الموظفين</h1>
    <p class="login-subtitle">سجّل دخولك للوصول إلى نظام الإدارة</p>

    <div id="alertBox" class="alert" role="alert"></div>

    <form id="loginForm" novalidate>
      <div class="field-group">
        <label class="field-label" for="email">البريد الإلكتروني</label>
        <input type="email" id="email" class="field-input" placeholder="name@finexsacapitalnet.com" autocomplete="username" required>
      </div>

      <div class="field-group">
        <label class="field-label" for="password">كلمة المرور</label>
        <input type="password" id="password" class="field-input" placeholder="••••••••••" autocomplete="current-password" required>
      </div>

      <label class="checkbox-row">
        <input type="checkbox" id="rememberMe" checked>
        <span>تذكّرني (موصى به)</span>
      </label>

      <button type="submit" id="loginBtn" class="btn btn-primary">
        <span class="btn-text">دخول النظام</span>
        <span class="spinner-btn"></span>
      </button>
    </form>

    <div class="login-footer">© 2026 FINEXSA Capital</div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import {
      getAuth, signInWithEmailAndPassword, setPersistence,
      browserLocalPersistence, browserSessionPersistence,
      onAuthStateChanged, signOut
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDynBPUjrpBHmPc6EGwHyOZmkEiv-pNhR0",
      authDomain: "finexsa-capital.firebaseapp.com",
      projectId: "finexsa-capital",
      storageBucket: "finexsa-capital.firebasestorage.app",
      messagingSenderId: "225933147484",
      appId: "1:225933147484:web:b71f87f0705553062ed599",
      measurementId: "G-8V2H675WN1"
    };

    const STAFF_API_URL = 'https://script.google.com/macros/s/AKfycbx_0dlteS5I41Z5vNb7E_IgsdMm2y8iFfe6QwL_OSgkpQu2HK4GqCug2CNz8eGB6pxa/exec';

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const rememberCheckbox = document.getElementById('rememberMe');
    const loginBtn = document.getElementById('loginBtn');
    const alertBox = document.getElementById('alertBox');

    // إذا كان المستخدم مسجّل دخول مسبقاً + جلسة محفوظة → الرئيسية
    onAuthStateChanged(auth, (user) => {
      if (user && localStorage.getItem('finexsa_m_uid')) {
        window.location.replace('index.html');
      }
    });

    function showAlert(msg, type = 'error') {
      alertBox.textContent = msg;
      alertBox.className = `alert show ${type}`;
    }
    function hideAlert() { alertBox.className = 'alert'; }

    function setLoading(loading) {
      loginBtn.disabled = loading;
      emailInput.disabled = loading;
      passwordInput.disabled = loading;
      loginBtn.classList.toggle('is-loading', loading);
    }

    function translateFirebaseError(code) {
      const map = {
        'auth/invalid-email': 'صيغة البريد الإلكتروني غير صحيحة',
        'auth/user-not-found': 'الحساب غير مسجّل',
        'auth/wrong-password': 'كلمة المرور غير صحيحة',
        'auth/invalid-credential': 'البريد أو كلمة المرور غير صحيحة',
        'auth/too-many-requests': 'محاولات كثيرة جداً. حاول لاحقاً',
        'auth/network-request-failed': 'تعذّر الاتصال بالشبكة',
        'auth/user-disabled': 'الحساب معطّل. تواصل مع المدير'
      };
      return map[code] || 'حدث خطأ في تسجيل الدخول';
    }

    function translateApiError(code) {
      const map = {
        'AUTH_FAILED': 'انتهت صلاحية الجلسة',
        'USER_NOT_FOUND': 'الحساب غير مسجّل في النظام',
        'USER_INACTIVE': 'حسابك معطّل. تواصل مع المدير',
        'PERMISSION_DENIED': 'لا تملك صلاحية الوصول'
      };
      return map[code] || 'تعذّر التحقق من صلاحياتك';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlert();

      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email || !password) {
        showAlert('يرجى تعبئة البريد وكلمة المرور');
        return;
      }

      setLoading(true);

      try {
        // ضبط مدة الجلسة — على الموبايل دائماً Local persistence
        await setPersistence(
          auth,
          rememberCheckbox.checked ? browserLocalPersistence : browserSessionPersistence
        );

        const credential = await signInWithEmailAndPassword(auth, email, password);
        const user = credential.user;
        const idToken = await user.getIdToken();

        const apiUrl = `${STAFF_API_URL}?action=getMe&token=${encodeURIComponent(idToken)}`;
        const res = await fetch(apiUrl);
        const data = await res.json();

        if (!data.ok) {
          await signOut(auth);
          showAlert(translateApiError(data.code));
          setLoading(false);
          return;
        }

        // حفظ في localStorage (للبقاء بين الجلسات على الموبايل)
        const staff = data.user;
        const storage = rememberCheckbox.checked ? localStorage : sessionStorage;
        storage.setItem('finexsa_m_uid', staff.uid);
        storage.setItem('finexsa_m_email', staff.email);
        storage.setItem('finexsa_m_name', staff.displayName || '');
        storage.setItem('finexsa_m_role', staff.role);
        storage.setItem('finexsa_m_branch', staff.branch || '');
        storage.setItem('finexsa_m_allowed', JSON.stringify(staff.allowedBoxes || []));

        showAlert('تم الدخول بنجاح', 'success');
        setTimeout(() => {
          window.location.replace('index.html');
        }, 400);

      } catch (err) {
        console.error('Login error:', err);
        showAlert(translateFirebaseError(err.code || ''));
        setLoading(false);
      }
    });

    [emailInput, passwordInput].forEach(input => {
      input.addEventListener('input', hideAlert);
    });
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
