<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0A0E1A">
  <meta name="robots" content="noindex, nofollow">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="../icons/icon-192.png">
  <link rel="manifest" href="manifest.json">
  <title>المهام — FINEXSA</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="m.css">

  <style>
    /* تبويبات الحالة */
    .status-tabs {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding: 2px 0;
      margin-bottom: 14px;
      scrollbar-width: none;
    }
    .status-tabs::-webkit-scrollbar { display: none; }
    .status-tab {
      flex-shrink: 0;
      padding: 8px 14px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 100px;
      color: var(--text-muted);
      font-size: 12.5px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .status-tab.is-active {
      background: var(--gold-muted);
      border-color: var(--gold);
      color: var(--gold-bright);
    }
    .status-tab-count {
      background: var(--bg-deep);
      padding: 1px 7px;
      border-radius: 100px;
      font-size: 10.5px;
      font-weight: 800;
    }
    .status-tab.is-active .status-tab-count {
      background: var(--gold);
      color: var(--bg-void);
    }

    /* بطاقة مهمة */
    .task-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 10px;
      transition: all 0.2s ease;
    }
    .task-card.priority-high { border-left: 3px solid var(--error); }
    .task-card.priority-medium { border-left: 3px solid var(--warning); }
    .task-card.priority-low { border-left: 3px solid var(--success); }

    .task-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 8px;
    }
    .task-title {
      font-size: 14.5px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.5;
      flex: 1;
    }
    .task-priority {
      font-size: 10px;
      font-weight: 800;
      padding: 3px 10px;
      border-radius: 100px;
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }
    .task-priority.high {
      background: rgba(255, 107, 107, 0.15);
      color: var(--error);
      border: 1px solid rgba(255, 107, 107, 0.3);
    }
    .task-priority.medium {
      background: rgba(245, 158, 11, 0.15);
      color: var(--warning);
      border: 1px solid rgba(245, 158, 11, 0.3);
    }
    .task-priority.low {
      background: rgba(74, 222, 128, 0.12);
      color: var(--success);
      border: 1px solid rgba(74, 222, 128, 0.3);
    }
    .task-desc {
      font-size: 12.5px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px dashed var(--border);
    }
    .task-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11.5px;
      color: var(--text-dim);
      margin-bottom: 12px;
    }
    .task-due {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .task-due svg { width: 12px; height: 12px; stroke-width: 2; stroke: currentColor; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .task-due.overdue { color: var(--error); font-weight: 800; }

    .task-action-btn {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 12.5px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .task-action-btn:active { transform: scale(0.97); }
    .task-action-btn.start {
      background: rgba(96, 165, 250, 0.12);
      border-color: rgba(96, 165, 250, 0.3);
      color: var(--info);
    }
    .task-action-btn.complete {
      background: rgba(74, 222, 128, 0.12);
      border-color: rgba(74, 222, 128, 0.3);
      color: var(--success);
    }
    .task-action-btn.reopen {
      background: var(--gold-muted);
      border-color: var(--border-strong);
      color: var(--gold-bright);
    }
    .task-action-btn svg { width: 14px; height: 14px; stroke-width: 2.4; stroke: currentColor; fill: none; }
  </style>
</head>
<body>

  <div class="app-loader" id="appLoader"><div class="spinner"></div></div>

  <header class="app-header">
    <div class="header-left">
      <button class="icon-btn" onclick="window.location.href='index.html'" aria-label="رجوع">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <h1 class="app-title">المهام</h1>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="refreshBtn" aria-label="تحديث">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
      </button>
    </div>
  </header>

  <main class="app-content">

    <!-- Status tabs -->
    <div class="status-tabs">
      <button class="status-tab is-active" data-status="todo">
        للتنفيذ <span class="status-tab-count" id="cTodo">0</span>
      </button>
      <button class="status-tab" data-status="in_progress">
        قيد التنفيذ <span class="status-tab-count" id="cProgress">0</span>
      </button>
      <button class="status-tab" data-status="done">
        منجزة <span class="status-tab-count" id="cDone">0</span>
      </button>
    </div>

    <!-- Tasks list -->
    <div id="taskList"></div>

  </main>

  <!-- Bottom Tabbar -->
  <nav class="tabbar">
    <a href="index.html" class="tab">
      <svg viewBox="0 0 24 24"><path d="M3 12l9-9 9 9"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/></svg>
      <span>الرئيسية</span>
    </a>
    <a href="cash.html" class="tab">
      <svg viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="14" rx="2"/><path d="M3 10h18"/><circle cx="12" cy="15" r="2"/></svg>
      <span>حركة</span>
    </a>
    <a href="report.html" class="tab">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span>كشف</span>
    </a>
    <a href="tasks.html" class="tab is-active">
      <svg viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      <span>المهام</span>
    </a>
  </nav>

  <div class="toast-container" id="toastContainer"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDynBPUjrpBHmPc6EGwHyOZmkEiv-pNhR0",
      authDomain: "finexsa-capital.firebaseapp.com",
      projectId: "finexsa-capital",
      storageBucket: "finexsa-capital.firebasestorage.app",
      messagingSenderId: "225933147484",
      appId: "1:225933147484:web:b71f87f0705553062ed599",
      measurementId: "G-8V2H675WN1"
    };

    const STAFF_API_URL = 'https://script.google.com/macros/s/AKfycbx_0dlteS5I41Z5vNb7E_IgsdMm2y8iFfe6QwL_OSgkpQu2HK4GqCug2CNz8eGB6pxa/exec';

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    function getStorage() {
      if (localStorage.getItem('finexsa_m_uid')) return localStorage;
      if (sessionStorage.getItem('finexsa_m_uid')) return sessionStorage;
      return null;
    }
    const storage = getStorage();
    if (!storage) window.location.replace('login.html');

    const me = {
      uid: storage.getItem('finexsa_m_uid'),
      name: storage.getItem('finexsa_m_name') || 'موظف',
      role: storage.getItem('finexsa_m_role') || 'accountant'
    };

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        localStorage.clear(); sessionStorage.clear();
        window.location.replace('login.html');
      }
    });

    function toast(msg, type = 'info', duration = 2000) {
      const el = document.createElement('div');
      el.className = `toast ${type}`;
      const icons = {
        success: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
        error: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
        info: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/></svg>'
      };
      el.innerHTML = `<div class="toast-icon">${icons[type]||icons.info}</div><span>${msg}</span>`;
      document.getElementById('toastContainer').appendChild(el);
      setTimeout(() => {
        el.classList.add('is-leaving');
        setTimeout(() => el.remove(), 200);
      }, duration);
    }

    // ═════ Unwrap Firestore ═════
    function unwrapValue(v) {
      if (v == null) return null;
      if (typeof v !== 'object') return v;
      if (v.stringValue !== undefined) return v.stringValue;
      if (v.integerValue !== undefined) return Number(v.integerValue);
      if (v.doubleValue !== undefined) return v.doubleValue;
      if (v.booleanValue !== undefined) return v.booleanValue;
      if (v.timestampValue !== undefined) return v.timestampValue;
      if (v.nullValue !== undefined) return null;
      if (v.arrayValue !== undefined) return (v.arrayValue.values || []).map(unwrapValue);
      if (v.mapValue !== undefined) {
        const o = {}; const f = v.mapValue.fields || {};
        for (const k in f) o[k] = unwrapValue(f[k]);
        return o;
      }
      return v;
    }
    function unwrapTask(t) {
      const result = { id: t.id };
      for (const key in t) {
        if (key === 'id') continue;
        result[key] = unwrapValue(t[key]);
      }
      return result;
    }

    // ═════ State ═════
    const state = {
      tasks: [],
      currentStatus: 'todo'
    };

    // ═════ Load ═════
    async function loadTasks() {
      try {
        const user = auth.currentUser;
        if (!user) return;
        const token = await user.getIdToken();
        const res = await fetch(`${STAFF_API_URL}?action=getTasks&token=${encodeURIComponent(token)}`);
        const data = await res.json();
        if (!data.ok) throw new Error(data.message);
        state.tasks = (data.tasks || []).map(unwrapTask);

        renderCounts();
        renderTasks();

        document.getElementById('appLoader').classList.add('is-hidden');
        setTimeout(() => document.getElementById('appLoader').remove(), 400);
      } catch (err) {
        toast('فشل التحميل: ' + err.message, 'error', 4000);
      }
    }

    onAuthStateChanged(auth, (user) => { if (user) loadTasks(); });
    document.getElementById('refreshBtn').addEventListener('click', loadTasks);

    // ═════ Status tabs ═════
    document.querySelectorAll('[data-status]').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('[data-status]').forEach(t => t.classList.remove('is-active'));
        tab.classList.add('is-active');
        state.currentStatus = tab.dataset.status;
        renderTasks();
      });
    });

    function renderCounts() {
      const todo = state.tasks.filter(t => t.status === 'todo' || !t.status).length;
      const progress = state.tasks.filter(t => t.status === 'in_progress').length;
      const done = state.tasks.filter(t => t.status === 'done').length;
      document.getElementById('cTodo').textContent = todo;
      document.getElementById('cProgress').textContent = progress;
      document.getElementById('cDone').textContent = done;
    }

    function renderTasks() {
      const list = document.getElementById('taskList');
      const filtered = state.tasks.filter(t =>
        (t.status === state.currentStatus) || (state.currentStatus === 'todo' && !t.status)
      );

      if (filtered.length === 0) {
        list.innerHTML = `
          <div class="empty">
            <div class="empty-icon">
              <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
            </div>
            <div class="empty-title">لا توجد مهام هنا</div>
            <div class="empty-msg">${state.currentStatus === 'done' ? 'لم تُنجز أي مهمة بعد' : 'لا توجد مهام في هذه الحالة'}</div>
          </div>
        `;
        return;
      }

      list.innerHTML = filtered.map(t => renderTaskCard(t)).join('');

      list.querySelectorAll('[data-action]').forEach(btn => {
        btn.addEventListener('click', () => {
          updateStatus(btn.dataset.taskId, btn.dataset.newStatus);
        });
      });
    }

    function renderTaskCard(t) {
      const priorityText = { high: 'عالية', medium: 'متوسطة', low: 'منخفضة' }[t.priority] || 'متوسطة';

      let dueHTML = '';
      if (t.dueDate) {
        const due = new Date(t.dueDate);
        const now = new Date();
        now.setHours(0,0,0,0);
        const isOverdue = due < now && t.status !== 'done';
        dueHTML = `
          <span class="task-due ${isOverdue ? 'overdue' : ''}">
            <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            ${formatDate(t.dueDate)}
          </span>
        `;
      }

      let actionBtn = '';
      if (t.status === 'todo' || !t.status) {
        actionBtn = `<button class="task-action-btn start" data-action data-task-id="${t.id}" data-new-status="in_progress">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          ابدأ التنفيذ
        </button>`;
      } else if (t.status === 'in_progress') {
        actionBtn = `<button class="task-action-btn complete" data-action data-task-id="${t.id}" data-new-status="done">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          تم الإنجاز
        </button>`;
      } else {
        actionBtn = `<button class="task-action-btn reopen" data-action data-task-id="${t.id}" data-new-status="in_progress">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7l-3 3"/><path d="M3 4v5h5"/></svg>
          إعادة فتح
        </button>`;
      }

      return `
        <div class="task-card priority-${t.priority || 'medium'}">
          <div class="task-head">
            <div class="task-title">${escapeHTML(t.title || '')}</div>
            <span class="task-priority ${t.priority || 'medium'}">${priorityText}</span>
          </div>
          ${t.description ? `<div class="task-desc">${escapeHTML(t.description)}</div>` : ''}
          <div class="task-meta">
            ${dueHTML || '<span></span>'}
            ${t.assigneeName ? `<span>${escapeHTML(t.assigneeName)}</span>` : ''}
          </div>
          ${actionBtn}
        </div>
      `;
    }

    async function updateStatus(id, newStatus) {
      try {
        const user = auth.currentUser;
        const token = await user.getIdToken();
        const res = await fetch(`${STAFF_API_URL}?action=updateTask`, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ token, data: { id, status: newStatus } })
        });
        const result = await res.json();
        if (!result.ok) throw new Error(result.message);

        // تحديث محلي
        const t = state.tasks.find(x => x.id === id);
        if (t) t.status = newStatus;
        renderCounts();
        renderTasks();

        const msg = newStatus === 'in_progress' ? '✓ بدأت التنفيذ' :
                    newStatus === 'done' ? '✓ تم الإنجاز' : '✓ أعيد الفتح';
        toast(msg, 'success', 1500);
      } catch (err) {
        toast(err.message, 'error');
      }
    }

    function formatDate(s) {
      if (!s) return '';
      const d = new Date(s);
      if (isNaN(d.getTime())) return s;
      return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;
    }
    function escapeHTML(s) {
      return String(s || '').replace(/[&<>"']/g, c =>
        ({'&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'}[c])
      );
    }
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
