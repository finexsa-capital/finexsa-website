<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0A0E1A">
  <meta name="robots" content="noindex, nofollow">
  <title>عرض شركة — FINEXSA Staff</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      -moz-font-feature-settings: "lnum";
      -webkit-font-feature-settings: "lnum";
      font-feature-settings: "lnum";
      font-variant-numeric: lining-nums tabular-nums;
    }

    :root {
      --bg-void: #0A0E1A;
      --bg-deep: #0F1220;
      --bg-card: #141827;
      --bg-card-hover: #1A1F32;
      --navy: #1E2A5A;
      --navy-light: #2A3A7A;
      --gold: #C9A227;
      --gold-bright: #E6BC3F;
      --gold-muted: rgba(201, 162, 39, 0.15);
      --text-primary: #EDEEF2;
      --text-muted: #8B92A8;
      --text-dim: #5C6378;
      --border: rgba(201, 162, 39, 0.12);
      --border-strong: rgba(201, 162, 39, 0.35);
      --error: #FF6B6B;
      --success: #4ADE80;
      --info: #60A5FA;
      --warning: #F59E0B;
      --purple: #A78BFA;
      --sidebar-w: 280px;
      --header-h: 72px;
      --font-arabic: 'Tajawal', -apple-system, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: var(--font-arabic);
      background: var(--bg-void);
      color: var(--text-primary);
      line-height: 1.7;
      font-size: 15px;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: ""; position: fixed; inset: 0;
      background:
        radial-gradient(ellipse at 20% 0%, rgba(30, 42, 90, 0.25) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 100%, rgba(201, 162, 39, 0.05) 0%, transparent 50%);
      pointer-events: none; z-index: 0;
    }
    a { text-decoration: none; color: inherit; }

    /* Loader */
    #appLoader {
      position: fixed; inset: 0;
      background: var(--bg-void);
      display: grid; place-items: center;
      z-index: 9999; transition: opacity 0.4s ease;
    }
    #appLoader.is-hidden { opacity: 0; pointer-events: none; }
    .loader-spinner {
      width: 48px; height: 48px;
      border: 3px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Shell */
    .app-shell {
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      min-height: 100vh;
      position: relative;
      z-index: 2;
    }

    /* Sidebar */
    .sidebar {
      background: var(--bg-deep);
      border-left: 1px solid var(--border);
      padding: 24px 18px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .sidebar-brand {
      display: flex; align-items: center; gap: 10px;
      padding: 0 8px 24px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 22px;
    }
    .sidebar-brand-logo {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--navy), var(--navy-light));
      border-radius: 10px;
      display: grid; place-items: center;
      color: var(--gold);
    }
    .sidebar-brand-logo svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    .sidebar-brand-text { display: flex; flex-direction: column; }
    .sidebar-brand-name { font-size: 15px; font-weight: 800; color: var(--gold); letter-spacing: 0.12em; line-height: 1.2; }
    .sidebar-brand-sub { font-size: 10.5px; color: var(--text-dim); letter-spacing: 0.1em; margin-top: 2px; }

    .sidebar-section-label {
      font-size: 10.5px; font-weight: 700;
      letter-spacing: 0.18em;
      color: var(--text-dim);
      text-transform: uppercase;
      padding: 0 8px;
      margin: 14px 0 8px;
    }

    .nav-list { list-style: none; }
    .nav-link {
      display: flex; align-items: center; gap: 11px;
      padding: 11px 12px;
      border-radius: 10px;
      color: var(--text-muted);
      font-size: 14px; font-weight: 600;
      transition: all 0.18s ease;
      margin-bottom: 3px;
      position: relative;
    }
    .nav-link:hover { background: var(--bg-card); color: var(--text-primary); }
    .nav-link.is-active {
      background: var(--gold-muted);
      color: var(--gold-bright);
    }
    .nav-link.is-active::before {
      content: ""; position: absolute;
      right: -18px; top: 50%;
      transform: translateY(-50%);
      width: 3px; height: 22px;
      background: var(--gold);
      border-radius: 0 3px 3px 0;
    }
    .nav-link svg {
      width: 18px; height: 18px;
      stroke: currentColor; fill: none;
      stroke-width: 1.8;
      stroke-linecap: round; stroke-linejoin: round;
      flex-shrink: 0;
    }

    .sidebar-footer { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--border); }
    .sidebar-version { font-size: 11px; color: var(--text-dim); text-align: center; }

    /* Main */
    .main { display: flex; flex-direction: column; min-width: 0; }

    .header {
      height: var(--header-h);
      padding: 0 32px;
      background: rgba(15, 18, 32, 0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
    }
    .header-left {
      display: flex; align-items: center; gap: 12px;
      flex-wrap: wrap;
      min-width: 0;
      flex: 1;
    }
    .header-toggle {
      display: none;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
    }
    .header-back {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--text-muted);
      font-size: 13px;
      transition: color 0.15s ease;
    }
    .header-back:hover { color: var(--gold); }
    .header-back svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }
    .header-title {
      font-size: 17px; font-weight: 800;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }
    .header-divider { color: var(--text-dim); }
    .header-crumb { font-size: 13px; color: var(--text-muted); }
    .header-crumb:hover { color: var(--gold); }
    .header-right { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .user-pill {
      display: flex; align-items: center; gap: 10px;
      padding: 6px 14px 6px 6px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 100px;
      font-size: 13px;
    }
    .user-pill-avatar {
      width: 30px; height: 30px;
      background: linear-gradient(135deg, var(--gold), var(--gold-bright));
      border-radius: 50%;
      display: grid; place-items: center;
      color: var(--bg-void);
      font-weight: 800; font-size: 12px;
    }

    /* Content */
    .content {
      padding: 32px;
      max-width: 1400px;
      width: 100%;
      margin: 0 auto;
    }

    /* Company Hero */
    .company-hero {
      background: linear-gradient(135deg, var(--bg-card), var(--bg-deep));
      border: 1px solid var(--border-strong);
      border-radius: 18px;
      padding: 28px;
      margin-bottom: 28px;
      display: flex;
      gap: 22px;
      align-items: flex-start;
      position: relative;
      overflow: hidden;
    }
    .company-hero::before {
      content: "";
      position: absolute;
      top: -60%; right: -10%;
      width: 380px; height: 380px;
      background: radial-gradient(circle, rgba(201, 162, 39, 0.10) 0%, transparent 60%);
      border-radius: 50%;
      pointer-events: none;
    }
    .company-hero-avatar {
      width: 76px; height: 76px;
      background: linear-gradient(135deg, var(--navy), var(--navy-light));
      border: 1px solid var(--border-strong);
      border-radius: 16px;
      display: grid; place-items: center;
      color: var(--gold);
      font-weight: 800;
      font-size: 26px;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }
    .company-hero-body { flex: 1; min-width: 0; position: relative; z-index: 1; }
    .company-hero-name {
      font-size: 26px;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 10px;
      line-height: 1.3;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .status-badge.active {
      background: rgba(74, 222, 128, 0.1);
      border: 1px solid rgba(74, 222, 128, 0.35);
      color: var(--success);
    }
    .status-badge.inactive {
      background: rgba(255, 107, 107, 0.1);
      border: 1px solid rgba(255, 107, 107, 0.35);
      color: var(--error);
    }
    .status-badge::before {
      content: "";
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    .company-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 16px 24px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .meta-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .meta-item .meta-label { color: var(--text-dim); font-weight: 600; }
    .meta-item .meta-value { color: var(--text-primary); font-weight: 700; }

    .assignee-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 5px 12px 5px 5px;
      background: var(--bg-deep);
      border: 1px solid var(--border);
      border-radius: 100px;
    }
    .assignee-chip-avatar {
      width: 22px; height: 22px;
      background: linear-gradient(135deg, var(--gold), var(--gold-bright));
      border-radius: 50%;
      display: grid; place-items: center;
      color: var(--bg-void);
      font-weight: 800;
      font-size: 9px;
      flex-shrink: 0;
    }

    /* Tasks grid */
    .section-title-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }
    .section-title-text {
      font-size: 16px;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: 0.02em;
    }
    .section-title-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .tasks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 18px;
    }

    .task-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }
    .task-card-head {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-bottom: 14px;
      margin-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }
    .task-card-icon {
      width: 40px; height: 40px;
      border-radius: 11px;
      display: grid; place-items: center;
      flex-shrink: 0;
    }
    .task-card-icon.daily {
      background: rgba(201, 162, 39, 0.12);
      border: 1px solid rgba(201, 162, 39, 0.35);
      color: var(--gold-bright);
    }
    .task-card-icon.weekly {
      background: rgba(96, 165, 250, 0.12);
      border: 1px solid rgba(96, 165, 250, 0.35);
      color: var(--info);
    }
    .task-card-icon.monthly {
      background: rgba(167, 139, 250, 0.12);
      border: 1px solid rgba(167, 139, 250, 0.35);
      color: var(--purple);
    }
    .task-card-icon svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

    .task-card-title { flex: 1; min-width: 0; }
    .task-card-name {
      font-size: 15px;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 2px;
    }
    .task-card-meta {
      font-size: 11.5px;
      color: var(--text-dim);
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .task-item {
      padding: 12px 14px;
      background: var(--bg-deep);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      transition: all 0.15s ease;
    }
    .task-item:hover {
      border-color: var(--border-strong);
      background: var(--bg-card-hover);
    }
    .task-item-num {
      min-width: 26px;
      height: 26px;
      padding: 0 7px;
      background: var(--gold-muted);
      border: 1px solid var(--border-strong);
      border-radius: 50%;
      color: var(--gold-bright);
      font-weight: 800;
      font-size: 12px;
      display: grid; place-items: center;
      flex-shrink: 0;
    }
    .task-item-body { flex: 1; min-width: 0; }
    .task-item-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.55;
    }
    .task-item-hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 5px;
      line-height: 1.6;
    }

    .task-empty-cat {
      padding: 28px 16px;
      text-align: center;
      color: var(--text-dim);
      font-size: 13px;
      border: 1px dashed var(--border);
      border-radius: 10px;
    }

    /* Skeleton */
    .skeleton {
      background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-card-hover) 50%, var(--bg-card) 75%);
      background-size: 200% 100%;
      animation: skeleton 1.4s ease-in-out infinite;
      border-radius: 8px;
    }
    @keyframes skeleton { from { background-position: 200% 0; } to { background-position: -200% 0; } }

    /* Error / Empty state */
    .full-state {
      padding: 80px 20px;
      text-align: center;
      max-width: 520px;
      margin: 60px auto;
    }
    .full-state-icon {
      width: 80px; height: 80px;
      margin: 0 auto 22px;
      border-radius: 50%;
      display: grid; place-items: center;
    }
    .full-state-icon.error {
      background: rgba(255, 107, 107, 0.1);
      border: 1px solid rgba(255, 107, 107, 0.35);
      color: var(--error);
    }
    .full-state-icon.warning {
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.4);
      color: var(--warning);
    }
    .full-state-icon svg { width: 34px; height: 34px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .full-state h2 { font-size: 22px; font-weight: 800; margin-bottom: 12px; }
    .full-state p { color: var(--text-muted); margin-bottom: 26px; font-size: 14px; line-height: 1.7; }

    /* Buttons */
    .btn {
      padding: 11px 20px;
      border: 1px solid transparent;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary {
      background: linear-gradient(135deg, var(--gold), var(--gold-bright));
      color: var(--bg-void);
    }
    .btn-secondary {
      background: var(--bg-card);
      color: var(--text-primary);
      border-color: var(--border-strong);
    }
    .btn-secondary:hover { background: var(--bg-card-hover); }
    .btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

    /* Toast */
    .toast-container {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }
    .toast {
      background: var(--bg-card);
      border: 1.5px solid var(--border-strong);
      border-radius: 12px;
      padding: 12px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 12px 30px -8px rgba(0,0,0,0.6);
      animation: toastIn 0.25s ease;
      pointer-events: auto;
      font-size: 14px;
      font-weight: 600;
      min-width: 280px;
    }
    @keyframes toastIn { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }
    .toast.error { border-color: var(--error); }
    .toast-icon {
      width: 26px; height: 26px;
      border-radius: 50%;
      display: grid; place-items: center;
    }
    .toast.error .toast-icon { background: rgba(255,107,107,0.15); color: var(--error); }
    .toast-icon svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.5; }

    /* Mobile */
    @media (max-width: 1024px) {
      .app-shell { grid-template-columns: 1fr; }
      .sidebar {
        position: fixed;
        right: 0; top: 0;
        width: var(--sidebar-w);
        z-index: 200;
        transform: translateX(100%);
        transition: transform 0.3s ease;
      }
      .sidebar.is-open { transform: translateX(0); }
      .header-toggle { display: flex; }
      .content { padding: 20px; }
      .company-hero {
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
        padding: 22px;
      }
      .company-hero-avatar { width: 60px; height: 60px; font-size: 22px; }
      .company-hero-name { font-size: 22px; }
    }
    @media (max-width: 640px) {
      .header-crumb { display: none; }
      .header-title { font-size: 15px; max-width: 200px; }
      .company-meta { flex-direction: column; gap: 10px; }
    }
  </style>
</head>

      <div class="sidebar-footer">
        <div class="sidebar-version">Companies v1.1.0</div>
      </div>
    </aside>

    <!-- Main -->
    <div class="main">
      <header class="header">
        <div class="header-left">
          <button class="header-toggle" id="sidebarToggle" aria-label="فتح القائمة">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </button>
          <a href="../dashboard.html" class="header-back">
            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            <span>الرئيسية</span>
          </a>
          <span class="header-divider">/</span>
          <a href="index.html" class="header-crumb">هيكلية الشركات</a>
          <span class="header-divider">/</span>
          <span class="header-title" id="headerTitle">…</span>
        </div>
        <div class="header-right">
          <div class="user-pill">
            <div class="user-pill-avatar" id="userAvatar">··</div>
            <span id="userName">…</span>
          </div>
        </div>
      </header>

      <!-- Main content (loads dynamically) -->
      <div class="content" id="mainContent" style="display:none">

        <!-- Company Hero -->
        <div class="company-hero">
          <div class="company-hero-avatar" id="companyAvatar">··</div>
          <div class="company-hero-body">
            <h1 class="company-hero-name">
              <span id="companyName">…</span>
              <span class="status-badge active" id="companyStatus">نشطة</span>
            </h1>
            <div class="company-meta" id="companyMeta">
              <!-- مُولَّد من JS -->
            </div>
          </div>
        </div>

        <!-- Tasks section -->
        <div class="section-title-row">
          <span class="section-title-text">المهام المعتمدة</span>
          <span class="section-title-line"></span>
        </div>

        <div class="tasks-grid" id="tasksGrid">
          <!-- مُولَّد من JS -->
        </div>

      </div>

      <!-- Error state (loads dynamically) -->
      <div class="content" id="errorContent" style="display:none">
        <div class="full-state">
          <div class="full-state-icon" id="errorIcon"></div>
          <h2 id="errorTitle">…</h2>
          <p id="errorMessage">…</p>
          <a href="index.html" class="btn btn-secondary">
            <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
            العودة لقائمة الشركات
          </a>
        </div>
      </div>

    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // ═══ إعدادات Firebase ═══
    const firebaseConfig = {
      apiKey: "AIzaSyDynBPUjrpBHmPc6EGwHyOZmkEiv-pNhR0",
      authDomain: "finexsa-capital.firebaseapp.com",
      projectId: "finexsa-capital",
      storageBucket: "finexsa-capital.firebasestorage.app",
      messagingSenderId: "225933147484",
      appId: "1:225933147484:web:b71f87f0705553062ed599",
      measurementId: "G-8V2H675WN1"
    };

    const COMPANIES_API_URL = 'https://script.google.com/macros/s/AKfycbzCfc35oOsexj1Oy6GffXvffDR56u_V42m9AX2D4apMoVF7MB-c9EU9zWMLzLfmO1M77Q/exec';

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // ═══ قراءة بيانات الموظف ═══
    const me = {
      uid: sessionStorage.getItem('finexsa_staff_uid'),
      email: sessionStorage.getItem('finexsa_staff_email') || '',
      name: sessionStorage.getItem('finexsa_staff_name') || 'موظف',
      role: sessionStorage.getItem('finexsa_staff_role') || 'accountant'
    };

    if (!me.uid) {
      window.location.replace('../login.html');
    }

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        sessionStorage.clear();
        window.location.replace('../login.html');
      }
    });

    const isAdmin = me.role === 'admin';

    // ═══ قراءة معرّف الشركة من الرابط ═══
    const params = new URLSearchParams(window.location.search);
    const companyId = (params.get('id') || '').trim();

    // ═══ المساعدات ═══
    function getInitials(name) {
      if (!name) return 'FX';
      const parts = String(name).trim().split(/\s+/);
      if (parts.length === 1) return parts[0].substring(0, 2).toUpperCase();
      return (parts[0][0] + parts[1][0]).toUpperCase();
    }

    function escapeHTML(s) {
      return String(s || '').replace(/[&<>"']/g, c =>
        ({'&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'}[c])
      );
    }

    function formatArabicDate(iso) {
      try {
        const d = new Date(iso);
        if (isNaN(d.getTime())) return '—';
        return d.toLocaleDateString('ar', {
          year: 'numeric', month: 'long', day: 'numeric'
        });
      } catch {
        return '—';
      }
    }

    document.getElementById('userName').textContent = me.name;
    document.getElementById('userAvatar').textContent = getInitials(me.name);

    // إظهار قسم الإدارة في الـ Sidebar (إن كان admin)
    if (isAdmin) {
      document.getElementById('adminSection').style.display = 'block';
      document.getElementById('adminNavList').style.display = 'block';
    }

    document.getElementById('sidebarToggle').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('is-open');
    });

    // ═══ Toast ═══
    function toast(msg, type = 'info', duration = 3500) {
      const el = document.createElement('div');
      el.className = `toast ${type}`;
      const icons = {
        error: '<svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
        info:  '<svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/></svg>'
      };
      el.innerHTML = `<div class="toast-icon">${icons[type]||icons.info}</div><span>${escapeHTML(msg)}</span>`;
      document.getElementById('toastContainer').appendChild(el);
      setTimeout(() => el.remove(), duration);
    }

    // ═══ شاشة الخطأ ═══
    const ICON_ERROR = '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';
    const ICON_WARNING = '<svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>';

    function showError(title, message, iconType = 'error') {
      document.getElementById('mainContent').style.display = 'none';
      document.getElementById('errorContent').style.display = 'block';
      document.getElementById('headerTitle').textContent = 'غير متاح';
      document.getElementById('errorTitle').textContent = title;
      document.getElementById('errorMessage').textContent = message;
      const iconEl = document.getElementById('errorIcon');
      iconEl.className = 'full-state-icon ' + (iconType === 'warning' ? 'warning' : 'error');
      iconEl.innerHTML = iconType === 'warning' ? ICON_WARNING : ICON_ERROR;
      hideLoader();
    }

    function hideLoader() {
      document.getElementById('appLoader').classList.add('is-hidden');
      setTimeout(() => {
        const l = document.getElementById('appLoader');
        if (l) l.remove();
      }, 400);
    }

    // ═══ التحقق المبكر من المعرّف ═══
    if (!companyId) {
      // ننتظر تحميل المتصفح ثم نظهر الخطأ
      window.addEventListener('DOMContentLoaded', () => {
        showError(
          'معرّف الشركة مفقود',
          'الرابط لا يحتوي على معرّف شركة صالح. الرجاء العودة إلى قائمة الشركات واختيار شركة من هناك.',
          'warning'
        );
      });
    }

    // ═══ تحميل الشركة + المهام بالتوازي ═══
    async function loadAll() {
      if (!companyId) return;
      try {
        const user = auth.currentUser;
        if (!user) {
          setTimeout(loadAll, 200);
          return;
        }
        const token = await user.getIdToken();
        const tokenEnc = encodeURIComponent(token);

        // استدعاءان متوازيان
        const [compRes, tasksRes] = await Promise.all([
          fetch(`${COMPANIES_API_URL}?action=getCompanies&token=${tokenEnc}`),
          fetch(`${COMPANIES_API_URL}?action=getDefaultTasks&token=${tokenEnc}`)
        ]);

        const compData  = await compRes.json();
        const tasksData = await tasksRes.json();

        if (!compData.ok) {
          throw new Error(compData.message || 'فشل تحميل بيانات الشركة');
        }
        if (!tasksData.ok) {
          throw new Error(tasksData.message || 'فشل تحميل المهام الافتراضية');
        }

        // البحث عن الشركة المطلوبة
        const company = (compData.companies || []).find(c => c.id === companyId);
        if (!company) {
          showError(
            'الشركة غير موجودة',
            'إما أن هذه الشركة قد حُذفت، أو ليس لديك صلاحية للوصول إليها. تواصل مع الإدارة إن كنت تتوقع رؤيتها.',
            'warning'
          );
          return;
        }

        // ترشيح المهام النشطة فقط
        const activeTasks = {
          daily:   (tasksData.tasks.daily   || []).filter(t => t.active !== false),
          weekly:  (tasksData.tasks.weekly  || []).filter(t => t.active !== false),
          monthly: (tasksData.tasks.monthly || []).filter(t => t.active !== false)
        };

        renderCompany(company);
        renderTasks(activeTasks);

        document.getElementById('mainContent').style.display = 'block';
        hideLoader();

      } catch (err) {
        showError('حدث خطأ في التحميل', err.message || 'تعذّر الاتصال بالخادم. تحقق من اتصالك بالإنترنت ثم أعِد تحميل الصفحة.');
      }
    }

    // ═══ عرض بيانات الشركة ═══
    function renderCompany(c) {
      // العنوان في الترويسة
      document.getElementById('headerTitle').textContent = c.name || 'بدون اسم';
      document.title = (c.name || 'شركة') + ' — FINEXSA Staff';

      // الأفاتار
      document.getElementById('companyAvatar').textContent = getInitials(c.name || 'CO');

      // الاسم
      document.getElementById('companyName').textContent = c.name || 'بدون اسم';

      // شارة الحالة
      const statusEl = document.getElementById('companyStatus');
      if (c.active === false) {
        statusEl.className = 'status-badge inactive';
        statusEl.textContent = 'معطّلة';
      } else {
        statusEl.className = 'status-badge active';
        statusEl.textContent = 'نشطة';
      }

      // البيانات الوصفية
      const metaEl = document.getElementById('companyMeta');
      const assigneeInitials = getInitials(c.assigneeName || c.assigneeUid || '?');
      const createdDate = c.createdAt ? formatArabicDate(c.createdAt) : '—';

      let html = '';

      // الموظف المسؤول
      html += `
        <div class="meta-item">
          <span class="meta-label">الموظف المسؤول:</span>
          <span class="assignee-chip">
            <span class="assignee-chip-avatar">${escapeHTML(assigneeInitials)}</span>
            <span class="meta-value">${escapeHTML(c.assigneeName || '—')}</span>
          </span>
        </div>
      `;

      // تاريخ الإنشاء
      html += `
        <div class="meta-item">
          <span class="meta-label">تاريخ الإنشاء:</span>
          <span class="meta-value">${escapeHTML(createdDate)}</span>
        </div>
      `;

      // أُنشئت بواسطة (للأدمن فقط، لأنه قد لا يكون مفيداً للموظف العادي)
      if (isAdmin && c.createdByName) {
        html += `
          <div class="meta-item">
            <span class="meta-label">أُنشئت بواسطة:</span>
            <span class="meta-value">${escapeHTML(c.createdByName)}</span>
          </div>
        `;
      }

      metaEl.innerHTML = html;
    }

    // ═══ عرض المهام ═══
    const CAT_CONFIG = {
      daily: {
        label: 'المهام اليومية',
        sub: 'تُنفَّذ في كل يوم عمل',
        icon: '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>'
      },
      weekly: {
        label: 'المهام الأسبوعية',
        sub: 'تُنفَّذ مرة في الأسبوع',
        icon: '<svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>'
      },
      monthly: {
        label: 'المهام الشهرية',
        sub: 'تُنفَّذ مرة في الشهر',
        icon: '<svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>'
      }
    };

    function renderTasks(tasks) {
      const grid = document.getElementById('tasksGrid');
      const cats = ['daily', 'weekly', 'monthly'];

      grid.innerHTML = cats.map(cat => {
        const conf = CAT_CONFIG[cat];
        const items = tasks[cat] || [];
        const count = items.length;

        let listHTML;
        if (count === 0) {
          listHTML = `<div class="task-empty-cat">لا توجد مهام مفعَّلة في هذا القسم.</div>`;
        } else {
          listHTML = items.map((t, i) => taskItemHTML(t, i + 1)).join('');
        }

        return `
          <div class="task-card">
            <div class="task-card-head">
              <div class="task-card-icon ${cat}">${conf.icon}</div>
              <div class="task-card-title">
                <div class="task-card-name">${escapeHTML(conf.label)}</div>
                <div class="task-card-meta">${count} مهمة · ${escapeHTML(conf.sub)}</div>
              </div>
            </div>
            <div class="task-list">${listHTML}</div>
          </div>
        `;
      }).join('');
    }

    function taskItemHTML(t, n) {
      const hint = t.hint && String(t.hint).trim()
        ? `<div class="task-item-hint">${escapeHTML(t.hint)}</div>`
        : '';
      return `
        <div class="task-item" data-task-id="${escapeHTML(t.id || '')}">
          <span class="task-item-num">${n}</span>
          <div class="task-item-body">
            <div class="task-item-label">${escapeHTML(t.label || '')}</div>
            ${hint}
          </div>
        </div>
      `;
    }

    // ═══ Bootstrap ═══
    onAuthStateChanged(auth, (user) => {
      if (user && companyId) {
        loadAll();
      }
    });
  </script>

</body>
</html>
